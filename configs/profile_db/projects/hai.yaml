bullets:

  - bullet_id: hai_b1
    text: >
      Designed a layered analytics pipeline ingesting Hevy workouts and Apple
      Health recovery data into PostgreSQL feature tables supporting strength,
      fatigue, and readiness modeling.
    lane_fit:
      lane_java_spring_backend_fullstack: 0.22
      lane_py_node_aws_genai_fullstack: 0.88
      lane_data_ml_analyst_engineer: 0.92

  - bullet_id: hai_b2
    text: >
      Implemented a constrained tool-calling agent that routes user questions to
      allowlisted analytics functions instead of querying raw tables directly,
      improving reliability and interpretability of LLM outputs.
    lane_fit:
      lane_java_spring_backend_fullstack: 0.18
      lane_py_node_aws_genai_fullstack: 0.96
      lane_data_ml_analyst_engineer: 0.64

  - bullet_id: hai_b3
    text: >
      Built feature-engineering pipelines computing ACWR, training load windows,
      PR detection, and recovery deltas for downstream analytics services.
    lane_fit:
      lane_java_spring_backend_fullstack: 0.26
      lane_py_node_aws_genai_fullstack: 0.84
      lane_data_ml_analyst_engineer: 0.95

  - bullet_id: hai_b4
    text: >
      Developed structured analytics tool interfaces returning confidence scores,
      coverage flags, and deterministic payload schemas for safe LLM interpretation.
    lane_fit:
      lane_java_spring_backend_fullstack: 0.24
      lane_py_node_aws_genai_fullstack: 0.94
      lane_data_ml_analyst_engineer: 0.82

  - bullet_id: hai_b5
    text: >
      Exposed analytics capabilities through a lightweight API layer enabling
      agent-driven strength progress comparison, fatigue snapshots, and recovery trend queries.
    lane_fit:
      lane_java_spring_backend_fullstack: 0.40
      lane_py_node_aws_genai_fullstack: 0.90
